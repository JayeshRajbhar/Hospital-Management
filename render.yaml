services:
  - type: web
    name: hospital-backend
    runtime: java
    buildCommand: cd hospital && mvn clean package -DskipTests
    startCommand: java -jar hospital/target/hospital-0.0.1-SNAPSHOT.jar
    envVars:
      - key: PORT
        value: 10000
      - key: JAVA_VERSION
        value: 21.0.0
      - key: SUPABASE_DB_PASSWORD
        sync: false
      - key: SPRING_DATASOURCE_URL
        value: jdbc:postgresql://aws-1-ap-south-1.pooler.supabase.com:6543/postgres
      - key: SPRING_DATASOURCE_USERNAME
        value: postgres.bpkpkpmvovzhvtxgnocj
